name: Deploy

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL para testar depois do deploy"
        required: true
        default: "http://localhost"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd "${{ secrets.SERVER_PATH || '/opt/whatsauto' }}"

            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            if [ ! -f .env.simple ]; then
              echo "Arquivo .env.simple nao encontrado no servidor."
              echo "Crie a partir de .env.simple.example antes de rodar o deploy."
              exit 1
            fi

            docker compose --env-file .env.simple -f docker-compose.simple.yml up -d --build --remove-orphans
            docker compose --env-file .env.simple -f docker-compose.simple.yml ps

      - name: Smoke test
        run: |
          chmod +x .github/scripts/smoke-tests.sh
          .github/scripts/smoke-tests.sh "${{ github.event.inputs.app_url }}"
