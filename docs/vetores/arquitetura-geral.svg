<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .group-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 14px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 12; }
      .browser { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 18; }
      .backend { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 18; }
      .data { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 18; }
      .external { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 18; }
      .line { fill: none; stroke: #334155; stroke-width: 2.5; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .label { font: 600 13px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="70" y="70" class="title">WHATS_AUTO - Arquitetura geral</text>
  <text x="70" y="102" class="subtitle">Mapa vetorial dos componentes principais e suas integrações</text>

  <rect x="70" y="150" width="340" height="280" class="browser"/>
