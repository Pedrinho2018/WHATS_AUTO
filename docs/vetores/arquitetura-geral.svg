  <text x="812" y="340" class="box-title">Services</text>
  <text x="812" y="360" class="box-text">Regras gerais</text>
  <rect x="560" y="415" width="170" height="58" class="box"/>
  <text x="582" y="440" class="box-title">Chatbot App</text>
  <text x="582" y="460" class="box-text">Inbound/outbound</text>
  <rect x="790" y="415" width="170" height="58" class="box"/>
  <text x="812" y="440" class="box-title">Socket.IO</text>
