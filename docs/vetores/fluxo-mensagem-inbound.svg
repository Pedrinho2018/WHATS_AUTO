<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="900" viewBox="0 0 1700 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 18px Arial, sans-serif; fill: #475569; }
      .actor { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 12; }
      .actor-title { font: 700 17px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .lifeline { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; }
      .msg { stroke: #334155; stroke-width: 2.4; marker-end: url(#arrow); }
      .event { stroke: #0f766e; stroke-width: 2.4; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
      .note { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; rx: 10; }
      .note-text { font: 400 14px Arial, sans-serif; fill: #713f12; }
    </style>
  </defs>

  <rect width="1700" height="900" fill="#f8fafc"/>
  <text x="70" y="70" class="title">Sequencia - mensagem inbound do WhatsApp</text>
  <text x="70" y="102" class="sub">Do webhook da Evolution ate a atualizacao realtime no frontend</text>

  <g>
    <rect x="70" y="150" width="160" height="58" class="actor"/>
    <text x="150" y="185" class="actor-title">WhatsApp</text>
    <line x1="150" y1="208" x2="150" y2="790" class="lifeline"/>
  </g>
  <g>
    <rect x="270" y="150" width="170" height="58" class="actor"/>
    <text x="355" y="185" class="actor-title">Evolution API</text>
    <line x1="355" y1="208" x2="355" y2="790" class="lifeline"/>
  </g>
  <g>
    <rect x="500" y="150" width="170" height="58" class="actor"/>
    <text x="585" y="185" class="actor-title">Backend</text>
    <line x1="585" y1="208" x2="585" y2="790" class="lifeline"/>
  </g>
  <g>
    <rect x="730" y="150" width="190" height="58" class="actor"/>
    <text x="825" y="185" class="actor-title">Parser</text>
    <line x1="825" y1="208" x2="825" y2="790" class="lifeline"/>
  </g>
  <g>
    <rect x="980" y="150" width="190" height="58" class="actor"/>
    <text x="1075" y="185" class="actor-title">Orchestrator</text>
    <line x1="1075" y1="208" x2="1075" y2="790" class="lifeline"/>
  </g>
  <g>
    <rect x="1230" y="150" width="170" height="58" class="actor"/>
    <text x="1315" y="185" class="actor-title">MariaDB</text>
    <line x1="1315" y1="208" x2="1315" y2="790" class="lifeline"/>
  </g>
  <g>
    <rect x="1450" y="150" width="180" height="58" class="actor"/>
    <text x="1540" y="185" class="actor-title">Frontend</text>
    <line x1="1540" y1="208" x2="1540" y2="790" class="lifeline"/>
  </g>

  <line x1="150" y1="255" x2="355" y2="255" class="msg"/>
  <text x="190" y="240" class="label">1. Usuario envia texto</text>

  <line x1="355" y1="320" x2="585" y2="320" class="msg"/>
  <text x="385" y="305" class="label">2. POST /api/webhooks/evolution</text>

  <line x1="585" y1="385" x2="825" y2="385" class="msg"/>
  <text x="625" y="370" class="label">3. parse(payload)</text>

  <line x1="825" y1="430" x2="585" y2="430" class="return"/>
  <text x="635" y="455" class="label">ParsedInbound</text>

  <line x1="585" y1="500" x2="1075" y2="500" class="msg"/>
  <text x="690" y="485" class="label">4. processInbound(parsed, raw)</text>

  <line x1="1075" y1="560" x2="1315" y2="560" class="msg"/>
  <text x="1105" y="545" class="label">5. instancia, ticket, mensagem</text>

  <line x1="1315" y1="610" x2="1075" y2="610" class="return"/>
  <text x="1120" y="635" class="label">ticket + message</text>

  <line x1="1075" y1="675" x2="1540" y2="675" class="event"/>
  <text x="1175" y="660" class="label">6. server:message.created</text>

  <line x1="585" y1="745" x2="355" y2="745" class="return"/>
  <text x="425" y="770" class="label">202 accepted</text>

  <rect x="985" y="720" width="360" height="72" class="note"/>
  <text x="1010" y="748" class="note-text">Tambem pode despachar para Typebot</text>
  <text x="1010" y="770" class="note-text">ou n8n depois de persistir a mensagem.</text>
</svg>
